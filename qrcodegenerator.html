<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <link rel="icon" type="image/x-icon" href="resources/qrcodefavicon.ico">

  <style>
    *, *::before, *::after {
    box-sizing: border-box;
    }

    p {
    margin: 1rem 0 1rem 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      position: relative;
    }

    .logo-corner {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 10;
    }

    .logo-corner img {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      transition: transform 0.3s ease;
    }

    .logo-corner img:hover {
      transform: scale(1.1);
    }
    .card {
      background: #020617;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 512px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #e5e7eb;

    }
    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #qrcode {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
    }
    footer {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
    }

    .warning-message {
      display: none;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      background: #7c2d12;
      border-left: 4px solid #ea580c;
      color: #fed7aa;
      font-size: 0.9rem;
      animation: slideDown 0.3s ease-out;
    }

    .warning-message.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .qr-navbar {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
    }

    .qr-navbar a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 1.5rem;
      transition: color 0.3s ease;
    }

    .qr-navbar a:hover {
      color: #3b82f6;
    }
  </style>
</head>
<body>
  <div class="logo-corner">
    <a href="/index.html">
      <img src="resources/falcon logo/android-chrome-192x192.png" alt="Fa1conX Logo">
    </a>
  </div>
  <div class="qr-navbar">
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/photoportfolio.html">Gallery</a>
    <a href="https://github.com/Fa1conX" target="_blank">GitHub</a>
  </div>
  <div class="card">
    <h1>QR Code Generator</h1>
    <div id="warningMessage" class="warning-message">
      ⚠️ <strong>Tip:</strong> It's recommended to use the shortened Google Forms link (forms.gle/...) for better QR code compatibility. The long link will still work, but the shortened version is preferred.
    </div>
    <input id="text" type="text" placeholder="Enter text or URL" onkeydown="handleEnter(event)" oninput="checkForLongGoogleFormsLink()" />
    <button onclick="generateQR()">Generate QR Code</button>
    <button id="downloadBtn" style="margin-top:0.5rem;background:#16a34a;opacity:0.5;cursor:not-allowed" onclick="downloadPNG()" disabled>Download PNG</button>
    <div id="qrcode"></div>
    <footer>
      Created by <a href="https://github.com/Fa1conX" target="_blank" style="color:#60a5fa">Karsten H</a>, Powered by <a href="https://github.com/davidshimjs/qrcodejs" target="_blank" style="color:#60a5fa">qrcodejs</a>
      <br> <a href="/index.html" style="color:#60a5fa">Back to Home</a>
    </footer>
  </div>

  <!-- Lightweight, well-known QR library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    let qr;
    let lastText = "";
    const DISCORD_WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1484702269395177583/X7oimPvjRg7tXuntSrfpPEEhPZwreCfQgKTVY8s-BzR_HkIHKlMktYozdrK2l0CvnSDO";

    // Check if the input is a long Google Forms link and show warning
    function checkForLongGoogleFormsLink() {
      const text = document.getElementById("text").value.trim();
      const warningElement = document.getElementById("warningMessage");
      
      // Pattern for long Google Forms URL
      const longFormsPattern = /https:\/\/docs\.google\.com\/forms\/d\/e\/[^/]+\/viewform/i;
      
      if (longFormsPattern.test(text)) {
        warningElement.classList.add("show");
      } else {
        warningElement.classList.remove("show");
      }
    }

    // Send log to Discord (fails silently if unreachable)
    function logToDiscord(message) {
      fetch(DISCORD_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: message })
      }).catch(() => {
        // Silently fail - don't disrupt user experience
      });
    }

    function generateQR() {
      const text = document.getElementById("text").value.trim();
      const container = document.getElementById("qrcode");
      const downloadBtn = document.getElementById("downloadBtn");

      if (!text) return;

      lastText = text;
      container.innerHTML = "";
      qr = new QRCode(container, {
        text: text,
        width: 512,
        height: 512,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      // Log to Discord
      const timestamp = new Date().toLocaleString();
      logToDiscord(`📱 **QR Generated** | ${timestamp}\n${text}`);

      downloadBtn.disabled = false;
      downloadBtn.style.opacity = "1";
      downloadBtn.style.cursor = "pointer";
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        generateQR();
      }
    }

    function downloadPNG() {
      const container = document.getElementById("qrcode");
      const img = container.querySelector("img");
      const canvas = container.querySelector("canvas");

      let dataUrl;
      if (img) {
        dataUrl = img.src;
      } else if (canvas) {
        dataUrl = canvas.toDataURL("image/png");
      } else {
        alert("Generate a QR code first");
        return;
      }

      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = "qr-code.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // Log download to Discord
      const timestamp = new Date().toLocaleString();
      logToDiscord(`⬇️ **PNG Downloaded** | ${timestamp}\n${lastText}`);
    }
    </script>
</body>
</html>
