<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscape - Photo Portfolio</title>
    <link rel="stylesheet" href="../home-styles.css">
    <link rel="icon" type="image/x-icon" href="../resources/falcon logo/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../resources/falcon logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../resources/falcon logo/favicon-16x16.png">
    <link rel="apple-touch-icon" href="../resources/falcon logo/apple-touch-icon.png">
    <link rel="manifest" href="../resources/falcon logo/site.webmanifest">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <a href="../index.html" class="logo-link">
                    <img src="../resources/falcon logo/android-chrome-192x192.png" alt="Fa1conX Logo" class="logo-image">
                    <h1 class="logo">Fa1conX</h1>
                </a>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../about.html">About</a></li>
                    <li><a href="../photoportfolio.html">Gallery</a></li>
                    <li><a href="../qrcodegenerator.html">QR Generator</a></li>
                    <li><a href="https://github.com/Fa1conX" target="_blank">GitHub</a></li>
                </ul>
            </div>
        </nav>

        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h2>Landscape</h2>
                    <p>Scenic Views</p>
                </div>
            </div>
        </section>
    </header>

    <main>
        <section class="gallery-section">
            <div class="container">
                <a href="../photoportfolio.html" class="back-link">&larr; Back to Categories</a>
                
                <div class="gallery-grid">
                    <!-- Image 1 -->
                    <div class="gallery-item">
                        <img src="../resources/portfolio-photos/landscape/K4211753 Large.jpeg" alt="Landscape Photo 1">
                    </div>

                    <!-- To add more images, simply duplicate the gallery-item div below -->
                    <!-- Template:
                    <div class="gallery-item">
                        <img src="YOUR_IMAGE_PATH_HERE" alt="Image description">
                    </div>
                    -->
                </div>
            </div>
        </section>
    </main>

    <!-- Image Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-container">
            <button class="lightbox-close" aria-label="Close image">&times;</button>
            <button class="lightbox-prev" aria-label="Previous image">&#10094;</button>
            <img id="lightbox-image" src="" alt="" class="lightbox-image">
            <button class="lightbox-next" aria-label="Next image">&#10095;</button>
            <div class="lightbox-counter">
                <span id="current-image">1</span> / <span id="total-images">1</span>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div>
                    <p>&copy; 2026 Fa1conX. All rights reserved.</p>
                    <div class="social-links">
                        <a href="https://github.com/Fa1conX" target="_blank">GitHub</a>
                        <a href="https://www.linkedin.com/in/karsten-hakes-174498212/" target="_blank">LinkedIn</a>
                        <a href="https://www.instagram.com/fa1conx_photography/" target="_blank">Instagram</a>
                    </div>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </footer>

    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Check for saved theme preference or default to 'dark'
        const currentTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);
        
        themeToggle.addEventListener('click', () => {
            const theme = html.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
        
        function updateThemeIcon(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        // Lightbox functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxclose = document.querySelector('.lightbox-close');
        const lightboxPrev = document.querySelector('.lightbox-prev');
        const lightboxNext = document.querySelector('.lightbox-next');
        const currentImageSpan = document.getElementById('current-image');
        const totalImageSpan = document.getElementById('total-images');
        const galleryItems = document.querySelectorAll('.gallery-item img');
        let currentImageIndex = 0;

        // Set total images dynamically
        totalImageSpan.textContent = galleryItems.length;

        // Open lightbox when image is clicked
        galleryItems.forEach((img, index) => {
            img.addEventListener('click', () => {
                currentImageIndex = index;
                openLightbox();
            });
        });

        function openLightbox() {
            const img = galleryItems[currentImageIndex];
            lightboxImage.src = img.src;
            lightboxImage.alt = img.alt;
            currentImageSpan.textContent = currentImageIndex + 1;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % galleryItems.length;
            openLightbox();
        }

        function showPrevImage() {
            currentImageIndex = (currentImageIndex - 1 + galleryItems.length) % galleryItems.length;
            openLightbox();
        }

        // Event listeners
        lightboxclose.addEventListener('click', closeLightbox);
        lightboxNext.addEventListener('click', showNextImage);
        lightboxPrev.addEventListener('click', showPrevImage);

        // Close on background click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') {
                showNextImage();
            } else if (e.key === 'ArrowLeft') {
                showPrevImage();
            } else if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
